apiVersion: metallb.io/v1beta1
kind: IPPool
metadata:
  name: default-pool
  namespace: {{ .Release.Namespace }}
spec:
  addresses:
    - 192.168.0.200-192.168.0.249
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default-l2
  namespace: {{ .Release.Namespace }}
spec:
  ipAddressPools:
    - default-pool

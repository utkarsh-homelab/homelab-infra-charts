kube-prometheus-stack:
  defaultRules:
    create: true
    rules:
      alertmanager: true
      etcd: true
      general: true
      kubeApiserver: true
      kubeControllerManager: true
      kubePrometheusGeneral: true
      kubePrometheusNodeRecording: true
      kubeScheduler: true
      kubeStateMetrics: true
      kubernetesApps: true
      kubernetesResources: true
      kubernetesStorage: true
      kubernetesSystem: true
      kubelet: true
      network: true
      node: true
      nodeExporter: true
      prometheus: true
      prometheusOperator: true

  alertmanager:
    enabled: true
    alertmanagerSpec:
      replicas: 1
      retention: 120h
      resources:
        requests:
          memory: 128Mi
          cpu: 50m
        limits:
          memory: 256Mi
          cpu: 100m
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: nfs-csi
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - alertmanager.uttutu.xyz
      paths:
        - /

  grafana:
    enabled: true
    adminUser: admin
    adminPassword: prom-operator
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - grafana.uttutu.xyz
      path: /
    persistence:
      enabled: true
      type: sts
      storageClassName: nfs-csi
      accessModes:
        - ReadWriteOnce
      size: 10Gi
    service:
      portName: http-web
    grafana.ini:
      server:
        root_url: https://grafana.uttutu.xyz
      auth:
        disable_login_form: false
      auth.anonymous:
        enabled: false
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
      datasources:
        enabled: true
        defaultDatasourceEnabled: true
        isDefaultDatasource: true

  prometheus:
    prometheusSpec:
      replicas: 1
      retention: 15d
      resources:
        requests:
          memory: 512Mi
          cpu: 200m
        limits:
          memory: 1Gi
          cpu: 500m
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: nfs-csi
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      podMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorNamespaceSelector: {}
      podMonitorNamespaceSelector: {}
      ruleNamespaceSelector: {}
      additionalServiceMonitors:
        - name: argocd-metrics
          namespaceSelector:
            matchNames:
              - argocd
          selector:
            matchLabels:
              app.kubernetes.io/name: argocd-metrics
          endpoints:
            - port: metrics
              interval: 30s
        - name: argocd-server-metrics
          namespaceSelector:
            matchNames:
              - argocd
          selector:
            matchLabels:
              app.kubernetes.io/name: argocd-server-metrics
          endpoints:
            - port: metrics
              interval: 30s
        - name: argocd-repo-server-metrics
          namespaceSelector:
            matchNames:
              - argocd
          selector:
            matchLabels:
              app.kubernetes.io/name: argocd-repo-server-metrics
          endpoints:
            - port: metrics
              interval: 30s
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - prometheus.uttutu.xyz
      paths:
        - /

  prometheusOperator:
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: true

  windowsMonitoring:
    enabled: false
